<!DOCTYPE html>
<html>
<head>
    <title>AI Weather Prediction</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }

        .container {
            margin-top: 50px;
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }

        input {
            padding: 10px;
            margin: 8px;
            width: 200px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #ff9800;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #e68900;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .icon {
            font-size: 40px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🌦️ AI Weather Prediction System</h1>

    <form action="/predict" method="post">
        <input type="text" name="a" placeholder="🌡️ Min Temp"><br>
        <input type="text" name="b" placeholder="🌡️ Max Temp"><br>
        <input type="text" name="c" placeholder="💧 Humidity"><br>
        <input type="text" name="d" placeholder="📊 Pressure"><br>
        <input type="text" name="e" placeholder="🌪️ Wind Speed"><br>

        <br>
        <button type="submit">Predict Weather</button>
    </form>

    <div class="result">
       {% if prediction_text %}
    <h2>{{ prediction_text }}</h2>

    <h3>📊 Model Comparison</h3>
    <iframe src="{{ url_for('static', filename='accuracy.html') }}" width="600" height="400"></iframe>
{% endif %}
    </div>
</div>

</body>
</html>
